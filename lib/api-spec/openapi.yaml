openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: VapeCommunity forum API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: users
    description: User operations
  - name: posts
    description: Post operations
  - name: comments
    description: Comment operations
  - name: categories
    description: Category operations
  - name: stats
    description: Community stats
  - name: products
    description: Shop products
  - name: product-categories
    description: Shop product categories
  - name: orders
    description: Customer orders

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ─── Users ───────────────────────────────────────────────────────────────────
  /users:
    get:
      operationId: listUsers
      tags: [users]
      summary: List all users
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
    post:
      operationId: createUser
      tags: [users]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserBody"
      responses:
        "201":
          description: Created user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          description: Bad request

  /users/{id}:
    get:
      operationId: getUser
      tags: [users]
      summary: Get user by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "404":
          description: Not found

  /users/login:
    post:
      operationId: loginUser
      tags: [users]
      summary: Login user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginBody"
      responses:
        "200":
          description: Logged in user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized

  # ─── Categories ───────────────────────────────────────────────────────────────
  /categories:
    get:
      operationId: listCategories
      tags: [categories]
      summary: List all categories
      responses:
        "200":
          description: List of categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"

  # ─── Posts ────────────────────────────────────────────────────────────────────
  /posts:
    get:
      operationId: listPosts
      tags: [posts]
      summary: List posts (optionally filtered by category)
      parameters:
        - name: categoryId
          in: query
          required: false
          schema:
            type: integer
        - name: limit
          in: query
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: List of posts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Post"
    post:
      operationId: createPost
      tags: [posts]
      summary: Create a new post
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePostBody"
      responses:
        "201":
          description: Created post
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Post"
        "400":
          description: Bad request

  /posts/trending:
    get:
      operationId: getTrendingPosts
      tags: [posts]
      summary: Get trending posts (high engagement)
      responses:
        "200":
          description: Trending posts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Post"

  /posts/latest:
    get:
      operationId: getLatestPosts
      tags: [posts]
      summary: Get latest posts across all categories
      responses:
        "200":
          description: Latest posts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Post"

  /posts/{id}:
    get:
      operationId: getPost
      tags: [posts]
      summary: Get post by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Post
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Post"
        "404":
          description: Not found
    patch:
      operationId: updatePost
      tags: [posts]
      summary: Update a post
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePostBody"
      responses:
        "200":
          description: Updated post
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Post"
        "404":
          description: Not found
    delete:
      operationId: deletePost
      tags: [posts]
      summary: Delete a post
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /posts/{id}/like:
    post:
      operationId: likePost
      tags: [posts]
      summary: Like a post
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated post
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Post"
        "404":
          description: Not found

  # ─── Comments ────────────────────────────────────────────────────────────────
  /posts/{postId}/comments:
    get:
      operationId: listComments
      tags: [comments]
      summary: List comments on a post
      parameters:
        - name: postId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of comments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Comment"
    post:
      operationId: createComment
      tags: [comments]
      summary: Post a comment
      parameters:
        - name: postId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCommentBody"
      responses:
        "201":
          description: Created comment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Comment"
        "400":
          description: Bad request

  # ─── Product Categories ───────────────────────────────────────────────────────
  /product-categories:
    get:
      operationId: listProductCategories
      tags: [product-categories]
      summary: List all product categories
      responses:
        "200":
          description: List of product categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProductCategory"

  # ─── Products ─────────────────────────────────────────────────────────────────
  /products:
    get:
      operationId: listProducts
      tags: [products]
      summary: List products (optionally filtered)
      parameters:
        - name: categoryId
          in: query
          required: false
          schema:
            type: integer
        - name: categorySlug
          in: query
          required: false
          schema:
            type: string
        - name: featured
          in: query
          required: false
          schema:
            type: boolean
        - name: search
          in: query
          required: false
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: List of products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"

  /products/featured:
    get:
      operationId: getFeaturedProducts
      tags: [products]
      summary: Get featured products
      responses:
        "200":
          description: Featured products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"

  /products/bestsellers:
    get:
      operationId: getBestsellerProducts
      tags: [products]
      summary: Get bestseller products
      responses:
        "200":
          description: Bestseller products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"

  /products/new:
    get:
      operationId: getNewProducts
      tags: [products]
      summary: Get new arrival products
      responses:
        "200":
          description: New products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"

  /products/{slug}:
    get:
      operationId: getProductBySlug
      tags: [products]
      summary: Get a product by slug
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "404":
          description: Not found

  # ─── Orders ───────────────────────────────────────────────────────────────────
  /orders:
    post:
      operationId: createOrder
      tags: [orders]
      summary: Create a new order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOrderBody"
      responses:
        "201":
          description: Order created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "400":
          description: Bad request

  /orders/{orderNumber}:
    get:
      operationId: getOrderByNumber
      tags: [orders]
      summary: Get an order by order number
      parameters:
        - name: orderNumber
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "404":
          description: Not found

  # ─── Stats ────────────────────────────────────────────────────────────────────
  /stats/community:
    get:
      operationId: getCommunityStats
      tags: [stats]
      summary: Get overall community stats
      responses:
        "200":
          description: Community stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommunityStats"

  /stats/active-users:
    get:
      operationId: getActiveUsers
      tags: [stats]
      summary: Get recently active users
      responses:
        "200":
          description: Active users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    User:
      type: object
      properties:
        id:
          type: integer
        username:
          type: string
        email:
          type: string
        avatarUrl:
          type: ["string", "null"]
        bio:
          type: ["string", "null"]
        isAiPersona:
          type: boolean
        isAdmin:
          type: boolean
          description: >-
            Only present on responses that authenticate the requester (login,
            signup). Public endpoints omit this field to avoid disclosing
            which accounts have admin privileges.
        sessionToken:
          type: ["string", "null"]
          description: >-
            Bearer token issued by login/signup. Only returned to the user it
            belongs to. Send as `Authorization: Bearer <token>` to call
            privileged endpoints.
        themePreference:
          type: ["string", "null"]
          description: >-
            User's saved theme preference ('light' or 'dark'). Only returned
            on login/signup. Null means no saved preference.
        postCount:
          type: integer
        joinedAt:
          type: string
          format: date-time
      required:
        - id
        - username
        - email
        - isAiPersona
        - postCount
        - joinedAt

    CreateUserBody:
      type: object
      properties:
        username:
          type: string
        email:
          type: string
        password:
          type: string
        bio:
          type: ["string", "null"]
      required:
        - username
        - email
        - password

    LoginBody:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
      required:
        - email
        - password

    Category:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        slug:
          type: string
        description:
          type: string
        postCount:
          type: integer
        iconEmoji:
          type: ["string", "null"]
      required:
        - id
        - name
        - slug
        - description
        - postCount

    Post:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        content:
          type: string
        categoryId:
          type: integer
        categoryName:
          type: ["string", "null"]
        authorId:
          type: integer
        authorName:
          type: string
        authorAvatarUrl:
          type: ["string", "null"]
        isAiGenerated:
          type: boolean
        likes:
          type: integer
        commentCount:
          type: integer
        tags:
          type: array
          items:
            type: string
        sourceUrl:
          type: ["string", "null"]
        imageUrl:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - title
        - content
        - categoryId
        - authorId
        - authorName
        - isAiGenerated
        - likes
        - commentCount
        - tags
        - createdAt
        - updatedAt

    CreatePostBody:
      type: object
      properties:
        title:
          type: string
        content:
          type: string
        categoryId:
          type: integer
        authorId:
          type: integer
        tags:
          type: array
          items:
            type: string
        sourceUrl:
          type: ["string", "null"]
      required:
        - title
        - content
        - categoryId
        - authorId

    UpdatePostBody:
      type: object
      properties:
        title:
          type: string
        content:
          type: string
        tags:
          type: array
          items:
            type: string

    Comment:
      type: object
      properties:
        id:
          type: integer
        postId:
          type: integer
        authorId:
          type: integer
        authorName:
          type: string
        authorAvatarUrl:
          type: ["string", "null"]
        content:
          type: string
        isAiGenerated:
          type: boolean
        likes:
          type: integer
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - postId
        - authorId
        - authorName
        - content
        - isAiGenerated
        - likes
        - createdAt

    CreateCommentBody:
      type: object
      properties:
        authorId:
          type: integer
        content:
          type: string
      required:
        - authorId
        - content

    ProductCategory:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        slug:
          type: string
        description:
          type: string
        iconEmoji:
          type: ["string", "null"]
        productCount:
          type: integer
        sortOrder:
          type: integer
      required:
        - id
        - name
        - slug
        - description
        - productCount
        - sortOrder

    Product:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        slug:
          type: string
        brand:
          type: string
        shortDescription:
          type: string
        description:
          type: string
        priceCents:
          type: integer
        comparePriceCents:
          type: ["integer", "null"]
        categoryId:
          type: integer
        categoryName:
          type: ["string", "null"]
        categorySlug:
          type: ["string", "null"]
        imageUrl:
          type: string
        imageGallery:
          type: array
          items:
            type: string
        rating:
          type: string
        reviewCount:
          type: integer
        stockCount:
          type: integer
        inStock:
          type: boolean
        isFeatured:
          type: boolean
        isNew:
          type: boolean
        isBestseller:
          type: boolean
        flavor:
          type: ["string", "null"]
        nicotineStrength:
          type: ["string", "null"]
        vgPgRatio:
          type: ["string", "null"]
        bottleSize:
          type: ["string", "null"]
        tags:
          type: array
          items:
            type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - slug
        - brand
        - shortDescription
        - description
        - priceCents
        - categoryId
        - imageUrl
        - imageGallery
        - rating
        - reviewCount
        - stockCount
        - inStock
        - isFeatured
        - isNew
        - isBestseller
        - tags
        - createdAt
        - updatedAt

    OrderItem:
      type: object
      properties:
        productId:
          type: integer
        name:
          type: string
        brand:
          type: string
        imageUrl:
          type: string
        priceCents:
          type: integer
        quantity:
          type: integer
      required:
        - productId
        - name
        - brand
        - imageUrl
        - priceCents
        - quantity

    CreateOrderItem:
      type: object
      description: Client-supplied order line — server resolves product details and price from DB.
      properties:
        productId:
          type: integer
          minimum: 1
        quantity:
          type: integer
          minimum: 1
          maximum: 99
      required:
        - productId
        - quantity

    CreateOrderBody:
      type: object
      properties:
        email:
          type: string
          format: email
          minLength: 3
          maxLength: 200
        customerName:
          type: string
          minLength: 1
          maxLength: 200
        shippingAddress:
          type: string
          minLength: 1
          maxLength: 500
        shippingCity:
          type: string
          minLength: 1
          maxLength: 100
        shippingState:
          type: string
          minLength: 1
          maxLength: 100
        shippingZip:
          type: string
          minLength: 1
          maxLength: 20
        shippingCountry:
          type: string
          minLength: 2
          maxLength: 2
          default: "US"
        items:
          type: array
          minItems: 1
          maxItems: 50
          items:
            $ref: "#/components/schemas/CreateOrderItem"
      required:
        - email
        - customerName
        - shippingAddress
        - shippingCity
        - shippingState
        - shippingZip
        - items

    Order:
      type: object
      properties:
        id:
          type: integer
        orderNumber:
          type: string
        email:
          type: string
        customerName:
          type: string
        shippingAddress:
          type: string
        shippingCity:
          type: string
        shippingState:
          type: string
        shippingZip:
          type: string
        shippingCountry:
          type: string
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrderItem"
        subtotalCents:
          type: integer
        shippingCents:
          type: integer
        taxCents:
          type: integer
        totalCents:
          type: integer
        status:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - orderNumber
        - email
        - customerName
        - shippingAddress
        - shippingCity
        - shippingState
        - shippingZip
        - shippingCountry
        - items
        - subtotalCents
        - shippingCents
        - taxCents
        - totalCents
        - status
        - createdAt

    CommunityStats:
      type: object
      properties:
        totalUsers:
          type: integer
        totalPosts:
          type: integer
        totalComments:
          type: integer
        onlineNow:
          type: integer
        postsToday:
          type: integer
        topCategory:
          type: string
      required:
        - totalUsers
        - totalPosts
        - totalComments
        - onlineNow
        - postsToday
        - topCategory
